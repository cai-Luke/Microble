<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MicrobeLE — Clinical Micro Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#0c0e13;color:#e8eaf0;font-family:'Newsreader','Georgia',serif}
  @keyframes hr{0%{opacity:0;transform:translateY(8px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes wp{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0.15)}50%{box-shadow:0 0 30px 10px rgba(74,222,128,0.15)}}
  @keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  input::placeholder{color:#555c72}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-thumb{background:#252a36;border-radius:3px}

  /* Layout */
  #app{position:relative}
  #dot-bg{position:fixed;inset:0;opacity:0.025;pointer-events:none;
    background-image:radial-gradient(#9b6dff 1px,transparent 1px);background-size:24px 24px}

  /* Header */
  header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid #252a36;background:linear-gradient(180deg,#14171f 0%,transparent 100%);
    position:relative;z-index:10}
  .hdr-btn{background:none;border:none;color:#8b92a8;cursor:pointer;
    font-family:'JetBrains Mono',monospace;padding:6px 10px;border-radius:6px;transition:all 0.2s}
  .hdr-btn:hover{color:#e8eaf0;background:#1a1e28}
  .hdr-title{text-align:center;cursor:pointer}
  .hdr-title h1{font-size:22px;font-weight:700;
    background:linear-gradient(135deg,#9b6dff,#e8576e);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hdr-subtitle{font-family:'JetBrains Mono',monospace;font-size:10px;color:#555c72;
    letter-spacing:2px;text-transform:uppercase;margin-top:2px}
  #hdr-archive-btn{font-size:12px}
  #hdr-how-btn{font-size:13px}

  /* Views */
  .view{max-width:560px;margin:0 auto;padding:20px 20px 100px}
  .view.entering{animation:fi 0.3s ease}
  .view.narrow{max-width:520px}

  /* How to play */
  #how-view h2{font-size:20px;margin-bottom:20px;color:#9b6dff}
  .how-body{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.8;color:#8b92a8}
  .how-body p{margin-bottom:16px}
  .how-hints-box{background:#14171f;border:1px solid #252a36;border-radius:8px;
    padding:12px 16px;margin-bottom:16px;font-size:11px;line-height:2.2}
  .how-hint-row span.num{color:#9b6dff}
  .how-legend{margin-bottom:16px}
  .how-note{color:#555c72;font-size:11px;margin-bottom:24px}
  .got-it-btn{background:#9b6dff;color:#fff;border:none;padding:12px 28px;border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.2s}
  .got-it-btn:hover{background:#6b3fc4}

  /* Archive */
  #archive-view h2{font-size:18px;margin-bottom:20px;color:#8b92a8;
    font-family:'JetBrains Mono',monospace;font-weight:500}
  .archive-list{display:flex;flex-direction:column;gap:6px}
  .archive-item{display:flex;align-items:center;justify-content:space-between;
    background:#14171f;border:1px solid #252a36;border-radius:8px;padding:12px 16px;
    color:#e8eaf0;font-size:13px;cursor:pointer;font-family:'JetBrains Mono',monospace;
    transition:all 0.2s;width:100%;text-align:left}
  .archive-item:hover{border-color:#9b6dff}
  .archive-item.today{background:rgba(155,109,255,0.15);border-color:#6b3fc4}
  .archive-item.today:hover{border-color:#9b6dff}
  .arch-num{color:#555c72;margin-right:12px}
  .arch-today-badge{margin-left:10px;font-size:10px;color:#9b6dff;
    background:rgba(155,109,255,0.15);padding:2px 8px;border-radius:4px}
  .arch-score-win{color:#4ade80}
  .arch-score-lose{color:#e8576e}
  .arch-score-none{color:#555c72}

  /* Game view */
  #game-date-info{text-align:center;margin-bottom:24px;font-family:'JetBrains Mono',monospace}
  .puzzle-num{font-size:11px;color:#555c72;letter-spacing:1.5px;text-transform:uppercase}
  .puzzle-date{font-size:13px;color:#8b92a8;margin-top:4px}
  .goto-today-btn{margin-left:12px;background:rgba(155,109,255,0.15);border:1px solid #6b3fc4;
    color:#9b6dff;padding:2px 10px;border-radius:4px;font-size:10px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;transition:all 0.2s}
  .goto-today-btn:hover{background:rgba(155,109,255,0.25)}

  /* Hint cards */
  #hints-container{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
  .hint-card{border-radius:10px;padding:14px 16px;transition:all 0.4s ease;border:1px solid #252a36}
  .hint-card.revealed{background:#14171f}
  .hint-card.unrevealed{background:transparent;opacity:0.35}
  .hint-card.animating{animation:hr 0.5s ease}
  .hint-card.last-win{background:rgba(74,222,128,0.15);border-color:#166534}
  .hint-card.last-lose{border-color:#b83a4e}
  .hint-header{display:flex;align-items:center;gap:10px}
  .hint-icon{font-size:14px}
  .hint-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
    letter-spacing:1.5px;text-transform:uppercase;color:#9b6dff}
  .hint-label.dim{color:#555c72}
  .hint-num-tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:#555c72}
  .hint-body{margin-top:8px;line-height:1.6;color:#8b92a8;
    font-family:'JetBrains Mono',monospace;font-size:12.5px}
  .hint-body.last{color:#e8eaf0;font-weight:600;font-family:'Newsreader',serif;font-size:15px}

  /* Guesses */
  #guesses-section{margin-bottom:16px}
  .guesses-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#555c72;
    letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .guesses-list{display:flex;flex-wrap:wrap;gap:6px}
  .guess-chip{font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 12px;
    border-radius:6px;font-style:italic}
  .guess-chip.correct{background:rgba(74,222,128,0.15);border:1px solid #166534;color:#4ade80}
  .guess-chip.wrong{background:rgba(232,87,110,0.08);border:1px solid #b83a4e;color:#e8576e}

  /* Result banner */
  #result-banner{border-radius:12px;padding:20px;text-align:center;margin-bottom:20px}
  #result-banner.win{background:rgba(74,222,128,0.15);border:1px solid #166534;
    animation:wp 2s ease 1}
  #result-banner.lose{background:rgba(232,87,110,0.06);border:1px solid #b83a4e;
    animation:fi 0.5s ease}
  .result-emoji{font-size:24px;margin-bottom:8px}
  .result-label-win{font-family:'JetBrains Mono',monospace;font-size:13px;
    color:#4ade80;font-weight:600;margin-bottom:4px}
  .result-label-lose{font-family:'JetBrains Mono',monospace;font-size:13px;
    color:#e8576e;font-weight:600;margin-bottom:4px}
  .result-name{font-size:18px;font-weight:700;font-style:italic;margin-bottom:4px}
  .result-score{font-family:'JetBrains Mono',monospace;font-size:12px;color:#8b92a8}
  .result-def{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8b92a8;
    line-height:1.5;max-width:400px;margin:8px auto 0}
  .result-btns{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .share-btn{background:#9b6dff;color:#fff;border:none;padding:10px 20px;border-radius:8px;
    font-size:12px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.2s}
  .share-btn:hover{background:#6b3fc4}
  .archive-link-btn{background:transparent;color:#8b92a8;border:1px solid #252a36;
    padding:10px 20px;border-radius:8px;font-size:12px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;transition:all 0.2s}
  .archive-link-btn:hover{color:#e8eaf0;border-color:#9b6dff}

  /* Input row */
  #input-row{position:relative}
  .input-flex{display:flex;gap:8px}
  .input-wrap{flex:1;position:relative}
  #org-input{width:100%;padding:12px 16px;background:#14171f;border:1px solid #252a36;
    border-radius:10px;color:#e8eaf0;font-family:'JetBrains Mono',monospace;
    font-size:13px;font-style:italic;outline:none;transition:border-color 0.2s}
  #org-input:focus{border-color:#9b6dff}
  #autocomplete{position:absolute;top:100%;left:0;right:0;background:#14171f;
    border:1px solid #252a36;border-radius:10px;margin-top:4px;overflow:hidden;
    z-index:100;max-height:280px;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.5)}
  .ac-item{padding:10px 16px;cursor:pointer;font-family:'JetBrains Mono',monospace;
    font-size:12.5px;font-style:italic;color:#8b92a8;transition:all 0.15s;
    border-bottom:1px solid #252a36;min-height:44px;display:flex;align-items:center}
  .ac-item:last-child{border-bottom:none}
  .ac-item:hover,.ac-item.active{background:#1a1e28;color:#e8eaf0}
  #skip-btn{background:transparent;border:1px solid #252a36;color:#8b92a8;
    padding:12px 16px;border-radius:10px;font-size:11px;white-space:nowrap;
    cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.2s}
  #skip-btn:hover:not(:disabled){border-color:#9b6dff;color:#e8eaf0}
  #skip-btn:disabled{color:#555c72;opacity:0.4;cursor:default}
  .input-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:#555c72;
    margin-top:8px;text-align:center}

  /* Score dots */
  #score-dots{display:flex;gap:4px;justify-content:center;margin-top:16px}
  .score-dot{width:36px;height:8px;border-radius:4px;transition:all 0.3s ease}
</style>
</head>
<body>

  <div id="dot-bg"></div>

</div>

   d:"GLYCOGEN-POSITIVE inclusions (iodine stain); EB/RB lifecycle; McCoy cell culture; #1 BACTERIAL STI; TRACHOMA; LGV"},
  {id:97,name:"Chlamydophila pneumoniae",g:"None (obligate intracellular)",m:"Obligate intracellular",o:"Not applicable",
   s:"Glycogen-NEGATIVE inclusions (unlike C. trachomatis) · Sulfonamide RESISTANT · Single serovar",
   c:"Atypical CAP, pharyngitis, bronchitis; person-to-person respiratory; NO animal reservoir",
   d:"PEAR-SHAPED elementary body (vs round in C. trachomatis); TWAR agent; glycogen-negative; no animal reservoir"},
  {id:98,name:"Rickettsia rickettsii",g:"Negative",m:"Obligate intracellular",o:"Aerobe (intracellular)",
   s:"Obligate intracellular · Infects vascular endothelial cells · Cannot grow cell-free",
   c:"Fever, headache, petechial rash beginning on wrists/ankles spreading centripetally; tick-borne",
   d:"DERMACENTOR tick; rash WRISTS/ANKLES → CENTER; Weil-Felix OX-19/OX-2; ROCKY MOUNTAIN SPOTTED FEVER"},
  {id:99,name:"Coxiella burnetii",g:"Negative",m:"Obligate intracellular",o:"Aerobe (intracellular)",
   s:"Obligate intracellular · Survives in phagolysosome (pH 4.5) · Endospore-like small cell variant",
   c:"Acute Q fever (pneumonia, hepatitis) and chronic (culture-negative endocarditis); livestock aerosols",
   d:"BSL-3; Phase I (virulent) / Phase II (avirulent) variation; Q FEVER; NOT TICK-BORNE (livestock aerosol); culture-negative endocarditis"},
  {id:100,name:"Ehrlichia chaffeensis",g:"Negative",m:"Obligate intracellular",o:"Not applicable",
   s:"Grows in monocytes/macrophages · PCR preferred · Cannot grow cell-free",
   c:"Fever, leukopenia, thrombocytopenia, elevated transaminases; tick-borne",
   d:"MORULAE (mulberry inclusions) in MONOCYTES on peripheral smear; LONE STAR TICK (Amblyomma americanum); HUMAN MONOCYTIC EHRLICHIOSIS"},
  {id:101,name:"Anaplasma phagocytophilum",g:"Negative",m:"Obligate intracellular",o:"Not applicable",
   s:"Grows in NEUTROPHILS (NOT monocytes) · PCR preferred · Cannot grow cell-free",
   c:"Fever, leukopenia, thrombocytopenia; Ixodes tick — coinfection with Lyme and Babesia possible",
   d:"MORULAE in NEUTROPHILS (not monocytes); IXODES tick; coinfection with Lyme/Babesia; HUMAN GRANULOCYTIC ANAPLASMOSIS"},
];

const EASY_NAMES = [
  "Staphylococcus aureus","Escherichia coli","Pseudomonas aeruginosa",
  "Streptococcus pyogenes","Clostridioides difficile","Streptococcus pneumoniae",
  "Klebsiella pneumoniae","Campylobacter jejuni","Neisseria gonorrhoeae",
  "Proteus mirabilis","Mycobacterium tuberculosis","Clostridium perfringens",
  "Helicobacter pylori","Salmonella enterica (non-typhoidal)",
];

const ARCHIVE_START = "2026-03-18";
const HINTS = [
  {key:"g",label:"Gram Stain",icon:"🔬"},
  {key:"m",label:"Morphology",icon:"🧫"},
  {key:"o",label:"O₂ Requirement",icon:"💨"},
  {key:"s",label:"Screening Tests",icon:"⚗️"},
  {key:"c",label:"Clinical Clue",icon:"🏥"},
  {key:"d",label:"Identification",icon:"🎯"},
];

// ── Utility functions ────────────────────────────────────────────
function ds(d){ return d.toISOString().split("T")[0]; }
function db(a,b){ return Math.round((new Date(b)-new Date(a))/864e5); }
function pn(d){ return db(ARCHIVE_START,d)+1; }
function fs(d){ return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function fl(d){ return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}); }

function seededShuffle(arr,seed){
  const a=[...arr]; let s=seed;
  for(let i=a.length-1;i>0;i--){
    s=(s*1103515245+12345)&0x7fffffff;
    const j=s%(i+1);
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function getOrg(dateStr){
  const di=db(ARCHIVE_START,dateStr);
  if(di>=0&&di<EASY_NAMES.length) return ORGANISMS.find(o=>o.name===EASY_NAMES[di])||ORGANISMS[0];
  const used=new Set(EASY_NAMES);
  const rest=ORGANISMS.filter(o=>!used.has(o.name));
  const sh=seededShuffle(rest,7919);
  return sh[((di-EASY_NAMES.length)%rest.length+rest.length)%rest.length];
}

function archiveDates(){
  const t=new Date(), ts=ds(t), dates=[], st=new Date(ARCHIVE_START);
  for(let d=new Date(st);ds(d)<=ts;d.setDate(d.getDate()+1)) dates.push(ds(d));
  return dates.reverse();
}

// ── localStorage (replaces window.storage) ──────────────────────
function loadDone(){
  try{ return JSON.parse(localStorage.getItem("mb_done")||"{}"); }catch{ return {}; }
}
function saveDone(done){
  try{ localStorage.setItem("mb_done",JSON.stringify(done)); }catch{}
}

// ── State ────────────────────────────────────────────────────────
const today = ds(new Date());
let prevView = null;
let state = {
  view: "game",
  gameDate: today,
  hints: 1,
  guesses: [],
  input: "",
  over: false,
  won: false,
  showAC: false,
  acI: -1,
  animIdx: null,
  done: loadDone(),
};

function getOrg_(){
  return getOrg(state.gameDate);
}

function getFilt(){
  if(!state.input.trim()) return [];
  const q=state.input.toLowerCase();
  return ORGANISMS.filter(o=>o.name.toLowerCase().includes(q))
                  .filter(o=>!state.guesses.includes(o.name))
                  .slice(0,8);
}

// ── Render ───────────────────────────────────────────────────────
function render(){
  const switching = prevView !== state.view;
  prevView = state.view;
  const content = document.getElementById("main-content");
  if(state.view==="how")          content.innerHTML = renderHow();
  else if(state.view==="archive") content.innerHTML = renderArchive();
  else                            content.innerHTML = renderGame();
  if(switching){
    const viewEl=content.querySelector(".view");
    if(viewEl){
      viewEl.classList.add("entering");
      viewEl.addEventListener("animationend",()=>viewEl.classList.remove("entering"),{once:true});
    }
  }
  bindEvents();
}

function renderHow(){
  return `<div class="view narrow" id="how-view">
    <h2>How to Play</h2>
    <div class="how-body">
      <p>Identify the mystery organism in as few hints as possible.</p>
      <p>You start with <strong style="color:#e8eaf0">one broad clue</strong> (Gram stain). Each wrong guess or skip reveals the next hint — from broad screening to definitive identification.</p>
      <div class="how-hints-box">
        ${HINTS.map((h,i)=>`<div class="how-hint-row"><span class="num">${i+1}.</span> ${h.icon} ${h.label}${i===5?" — the giveaway":""}</div>`).join("")}
      </div>
      <p class="how-legend"><span style="color:#4ade80">🟩 solved</span>&nbsp;&nbsp;<span style="color:#e8576e">🟥 wrong/skipped</span>&nbsp;&nbsp;<span style="color:#555c72">⬛ unused</span></p>
      <p class="how-note">101 organisms aligned to the ASCP SM exam scope.</p>
    </div>
    <button class="got-it-btn" id="got-it-btn">Got it</button>
  </div>`;
}

function renderArchive(){
  const dates=archiveDates();
  const items=dates.map(d=>{
    const c2=state.done[d]; const isT=d===today;
    let scoreHtml;
    if(c2){
      scoreHtml=c2.won
        ?`<span class="arch-score-win">${c2.score}/6 ✓</span>`
        :`<span class="arch-score-lose">X/6</span>`;
    } else {
      scoreHtml=`<span class="arch-score-none">—</span>`;
    }
    return `<button class="archive-item${isT?" today":""}" data-date="${d}">
      <span><span class="arch-num">#${pn(d)}</span>${fs(d)}${isT?`<span class="arch-today-badge">TODAY</span>`:""}</span>
      <span>${scoreHtml}</span>
    </button>`;
  }).join("");
  return `<div class="view narrow" id="archive-view">
    <h2>Puzzle Archive</h2>
    <div class="archive-list">${items}</div>
  </div>`;
}

function renderGame(){
  const org=getOrg_();
  const {hints,guesses,over,won,showAC,acI,animIdx,gameDate,input,done}=state;
  const filt=getFilt();
  const savedGame=done[gameDate];

  // Puzzle header
  const todayBtn=gameDate!==today
    ?`<button class="goto-today-btn" id="goto-today-btn">today →</button>`:"";
  const header=`<div id="game-date-info">
    <div class="puzzle-num">Puzzle #${pn(gameDate)}</div>
    <div class="puzzle-date">${fl(gameDate)}${todayBtn}</div>
  </div>`;

  // Hint cards
  const hintCards=HINTS.map((h,i)=>{
    const rev=i<hints;
    const isLast=i===5;
    let cls="hint-card";
    if(rev) cls+=" revealed"; else cls+=" unrevealed";
    if(animIdx===i) cls+=" animating";
    if(isLast&&rev&&over){
      if(won) cls+=" last-win"; else cls+=" last-lose";
    }
    const labelCls=rev?"hint-label":"hint-label dim";
    const numTag=!rev?`<span class="hint-num-tag">Hint ${i+1}</span>`:"";
    const body=rev?`<div class="hint-body${isLast?" last":""}">${escHtml(org[h.key])}</div>`:"";
    return `<div class="${cls}">${body?`<div class="hint-header"><span class="hint-icon">${h.icon}</span><span class="${labelCls}">${h.label}</span>${numTag}</div>${body}`:`<div class="hint-header"><span class="hint-icon">${h.icon}</span><span class="${labelCls}">${h.label}</span>${numTag}</div>`}</div>`;
  }).join("");

  // Guesses section
  let guessesHtml="";
  if(guesses.length>0){
    const chips=guesses.map(g=>`<span class="guess-chip ${g===org.name?"correct":"wrong"}">${escHtml(g)}</span>`).join("");
    guessesHtml=`<div id="guesses-section"><div class="guesses-label">Your guesses</div><div class="guesses-list">${chips}</div></div>`;
  }

  // Result banner
  let resultHtml="";
  if(over){
    const sc=savedGame?.score||guesses.length;
    const w=savedGame?.won??won;
    if(w){
      resultHtml=`<div id="result-banner" class="win">
        <div class="result-emoji">🦠</div>
        <div class="result-label-win">Identified!</div>
        <div class="result-name">${escHtml(org.name)}</div>
        <div class="result-score">Solved in ${sc} hint${sc>1?"s":""}</div>
        <div class="result-btns">
          <button class="share-btn" id="share-btn">Share result</button>
          <button class="archive-link-btn" id="to-archive-btn">Browse archive</button>
        </div>
      </div>`;
    } else {
      resultHtml=`<div id="result-banner" class="lose">
        <div class="result-emoji">💀</div>
        <div class="result-label-lose">Not this time</div>
        <div class="result-name">${escHtml(org.name)}</div>
        <div class="result-def">${escHtml(org.d)}</div>
        <div class="result-btns">
          <button class="share-btn" id="share-btn">Share result</button>
          <button class="archive-link-btn" id="to-archive-btn">Browse archive</button>
        </div>
      </div>`;
    }
  }

  // Input row
  let acHtml="";
  const skipDisabled=hints>=6?"disabled":"";
  const inputHtml=!over?`<div id="input-row">
    <div class="input-flex">
      <div class="input-wrap">
        <input id="org-input" type="text" placeholder="Type organism name..." autocomplete="off" value="${escAttr(input)}">
      </div>
      <button id="skip-btn" ${skipDisabled}>Skip →</button>
    </div>
    <div class="input-info">${6-guesses.length} guess${6-guesses.length!==1?"es":""} remaining · Hint ${hints} of 6</div>
  </div>`:"";
  void acHtml;
  // Score dots
  let dotsHtml="";
  if(over){
    const sc2=savedGame?.score||guesses.length;
    const w2=savedGame?.won??won;
    const dots=HINTS.map((_,i)=>{
      let bg="#252a36";
      if(w2&&i===sc2-1) bg="#4ade80";
      else if(i<(w2?sc2:6)) bg="#e8576e";
      const delay=i*80;
      return `<div class="score-dot" style="background:${bg};opacity:${bg==="#252a36"?"0.3":"0.8"};transition-delay:${delay}ms"></div>`;
    }).join("");
    dotsHtml=`<div id="score-dots">${dots}</div>`;
  }

  return `<div class="view" id="game-view">
    ${header}
    <div id="hints-container">${hintCards}</div>
    ${guessesHtml}
    ${resultHtml}
    ${inputHtml}
    ${dotsHtml}
  </div>`;
}

// ── HTML escape helpers ──────────────────────────────────────────
function escHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s){
  return String(s).replace(/"/g,"&quot;");
}

// ── Share text ───────────────────────────────────────────────────
function shareText(){
  const s=state.done[state.gameDate]; if(!s) return "";
  const sc=s.won?s.score:"X";
  const b=HINTS.map((_,i)=>{
    if(s.won&&i===s.score-1) return "🟩";
    if(i<(s.won?s.score:6)) return "🟥";
    return "⬛";
  }).join("");
  return `🦠 MicrobeLE #${pn(state.gameDate)} ${sc}/6\n${b}`;
}

// ── Game actions ─────────────────────────────────────────────────
function animateHintCard(){
  requestAnimationFrame(()=>{
    const card=document.querySelector(".hint-card.animating");
    if(card){
      card.addEventListener("animationend",()=>card.classList.remove("animating"),{once:true});
      setTimeout(()=>card.classList.remove("animating"),700); // fallback
    }
    state.animIdx=null;
  });
}

function doGuess(name){
  const g=name||state.input.trim();
  if(!g||state.over) return;
  const match=ORGANISMS.find(o=>o.name.toLowerCase()===g.toLowerCase());
  if(!match) return;
  const ng=[...state.guesses, match.name];
  state.guesses=ng;
  state.input="";
  state.showAC=false;
  state.acI=-1;
  if(match.name===getOrg_().name){
    state.won=true; state.over=true; state.hints=6;
    const nd={...state.done,[state.gameDate]:{score:ng.length,won:true}};
    state.done=nd; saveDone(nd);
  } else {
    const h=Math.min(state.hints+1,6);
    state.animIdx=h-1;
    state.hints=h;
    if(h>=6){
      state.over=true;
      const nd={...state.done,[state.gameDate]:{score:6,won:false}};
      state.done=nd; saveDone(nd);
    }
    render();
    animateHintCard();
    return;
  }
  render();
}

function doSkip(){
  if(state.over||state.hints>=6) return;
  const h=state.hints+1;
  state.animIdx=h-1;
  state.hints=h;
  render();
  animateHintCard();
}

function setGameDate(d){
  state.gameDate=d;
  const s=state.done[d];
  if(s){
    state.over=true; state.won=s.won; state.hints=6; state.guesses=[];
  } else {
    state.over=false; state.won=false; state.hints=1; state.guesses=[]; state.input="";
  }
  state.showAC=false; state.acI=-1; state.animIdx=null;
}

// ── Event binding ────────────────────────────────────────────────
function bindEvents(){
  // Header
  document.getElementById("hdr-how-btn").onclick=()=>{ state.view="how"; render(); };
  document.getElementById("hdr-logo").onclick=()=>{ setGameDate(today); state.view="game"; render(); };
  document.getElementById("hdr-archive-btn").onclick=()=>{ state.view="archive"; render(); };

  if(state.view==="how"){
    document.getElementById("got-it-btn").onclick=()=>{ state.view="game"; render(); };
  }

  if(state.view==="archive"){
    document.querySelectorAll(".archive-item").forEach(btn=>{
      btn.onclick=()=>{ setGameDate(btn.dataset.date); state.view="game"; render(); };
    });
  }

  if(state.view==="game"){
    const gotoToday=document.getElementById("goto-today-btn");
    if(gotoToday) gotoToday.onclick=()=>{ setGameDate(today); render(); };

    const shareBtn=document.getElementById("share-btn");
    if(shareBtn) shareBtn.onclick=()=>{ navigator.clipboard.writeText(shareText()); };

    const toArchive=document.getElementById("to-archive-btn");
    if(toArchive) toArchive.onclick=()=>{ state.view="archive"; render(); };

    const skipBtn=document.getElementById("skip-btn");
    if(skipBtn) skipBtn.onclick=doSkip;

    const orgInput=document.getElementById("org-input");
    if(orgInput){
      orgInput.focus();
      orgInput.oninput=e=>{
        state.input=e.target.value;
        state.showAC=true;
        state.acI=-1;
        renderAC();
      };
      orgInput.onfocus=()=>{ state.showAC=true; renderAC(); };
      orgInput.onblur=()=>{ setTimeout(()=>{ state.showAC=false; renderAC(); },200); };
      orgInput.onkeydown=e=>{
        const filt=getFilt();
        if(e.key==="ArrowDown"){
          e.preventDefault();
          state.acI=Math.min(state.acI+1,filt.length-1);
          renderAC();
        } else if(e.key==="ArrowUp"){
          e.preventDefault();
          state.acI=Math.max(state.acI-1,0);
          renderAC();
        } else if(e.key==="Enter"){
          e.preventDefault();
          if(state.acI>=0&&filt[state.acI]) doGuess(filt[state.acI].name);
          else if(filt.length===1) doGuess(filt[0].name);
          else if(state.input.trim()) doGuess(state.input.trim());
        } else if(e.key==="Escape"){
          state.showAC=false;
          renderAC();
        }
      };
    }
  }
}

function renderAC(){
  const wrap=document.querySelector(".input-wrap");
  if(!wrap) return;
  const filt=getFilt();

  let ac=document.getElementById("autocomplete");

  if(!state.showAC||filt.length===0){
    if(ac) ac.remove();
    return;
  }

  if(!ac){
    ac=document.createElement("div");
    ac.id="autocomplete";
    wrap.appendChild(ac);
    // Prevent input blur when interacting with the dropdown
    ac.addEventListener("mousedown",e=>e.preventDefault());
    // Single delegated click handler — robust regardless of inner DOM changes
    ac.addEventListener("click",e=>{
      const item=e.target.closest(".ac-item");
      if(item) doGuess(item.dataset.name);
    });
  }

  // Rebuild list contents
  ac.innerHTML=filt.map((o,i)=>`<div class="ac-item${i===state.acI?" active":""}" data-name="${escAttr(o.name)}">${escHtml(o.name)}</div>`).join("");

  // Hover highlighting — only touch CSS classes, no DOM replacement
  ac.querySelectorAll(".ac-item").forEach((el,i)=>{
    el.addEventListener("mouseenter",()=>{
      state.acI=i;
      ac.querySelectorAll(".ac-item").forEach((e,j)=>e.classList.toggle("active",j===i));
    });
    el.addEventListener("mouseleave",()=>{
      state.acI=-1;
      el.classList.remove("active");
    });
  });
}

// ── Init ─────────────────────────────────────────────────────────
(function init(){
  // Load saved game state for today
  const s=state.done[state.gameDate];
  if(s){
    state.over=true; state.won=s.won; state.hints=6; state.guesses=[];
  }
  render();
})();
</script>
</body>
